[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/var/run/supervisord.pid
loglevel=info

[program:chromium]
command=chromium --headless=new --no-sandbox --disable-setuid-sandbox --remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --disable-dev-shm-usage --disable-gpu --no-first-run --disable-background-networking --disable-sync --disable-default-apps --hide-scrollbars --mute-audio --disable-software-rasterizer --disable-extensions
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
priority=10

[program:handoff]
command=node src/server.js
directory=/app
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
environment=PORT="80",CDP_HTTP_URL="http://127.0.0.1:9222",SESSION_SECRET="%(ENV_SESSION_SECRET)s",PUBLIC_BASE_URL="%(ENV_PUBLIC_BASE_URL)s"
priority=20
startsecs=5